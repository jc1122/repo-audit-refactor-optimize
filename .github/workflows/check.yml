name: check

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: python -m pip install pytest==9.0.3 hypothesis==6.155.2
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Release checks
        run: python scripts/check_release.py

  convergence-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # hotspot/growth audits mine full git history (shallow clone errors them -> stale accepts)
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install leaf toolchain
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage==7.14.1 lizard==1.23.0 radon==6.0.1 \
            vulture==2.16 ruff==0.15.16 mypy==2.1.0 bandit==1.9.4 pylint==3.3.9 \
            astroid==3.3.11 perflint==0.8.1
          python -m pip install pytest==9.0.3 hypothesis==6.155.2  # coverage-gap gate suite
      - name: Clone leaves at a pinned tag
        run: |
          git clone --depth 1 --branch v0.7.5 https://github.com/jc1122/repo-audit-skills.git /tmp/leaves
          (cd /tmp/leaves && npm ci)   # jscpd for the duplication leaf (L1)
          test -x /tmp/leaves/node_modules/.bin/jscpd || (echo "jscpd missing" && exit 1)
          echo "/tmp/leaves/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Convergence gate (Tier-1 wave)
        env:
          WAVE_RUNNER: ${{ github.workspace }}/scripts/run_diagnosis_wave.py
          SKILLS_ROOT: /tmp/leaves/skills
        run: python3 scripts/check_wave_baseline.py   # real exit code, not piped (L4)
      - name: Accept-reason quality gate (#3)
        run: python3 scripts/check_accept_reasons.py
      - name: Coverage-gap gate (Tier-1 graduation)
        env:
          LEAF: /tmp/leaves/skills/coverage-gap-audit/scripts/coverage_gap_audit.py
        run: python3 scripts/check_coverage_gap.py --suite tests --source-prefix scripts
